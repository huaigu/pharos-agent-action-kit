[profile.default]
src = "."
out = "out"
libs = []
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

# src = "." so `forge build` compiles the self-contained MockVault fixture (and the
# temporary demo token the smoke script writes). The fixture has no remappings or
# external libraries — inline IERC20 — so the build is a pure compile-check.
